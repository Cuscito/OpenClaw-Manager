name: Build and Release

on:
  push:
    branches: [main, master, "v*"]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: 编译发布
        run: dotnet publish OpenClawManager.csproj -c Release -o publish --self-contained -r win-x64

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Manager
          path: publish/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 下载产物
        uses: actions/download-artifact@v4
        with:
          name: OpenClaw-Manager
          path: publish

      - name: 打包
        run: |
          cd publish
          zip -r ../OpenClaw-Manager.zip .

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          files: OpenClaw-Manager.zip
          generate_release_notes: true
